# Общие настройки DaData
base.url=https://suggestions.dadata.ru

# Сетевые тайм-ауты в миллисекундах
http.connection-timeout-ms=5000
http.socket-timeout-ms=10000

# Endpoints
endpoint.ip-locate=/suggestions/api/4_1/rs/iplocate/address
endpoint.suggest-address=/suggestions/api/4_1/rs/suggest/address
endpoint.find-party=/suggestions/api/4_1/rs/findById/party
endpoint.find-bank=/suggestions/api/4_1/rs/findById/bank

# Позитивные тестовые данные
test.ip-address=46.226.227.20
test.address-query=Москва, Тверская улица, 1
test.sberbank-inn=7707083893
test.sberbank-bic=044525225

# Негативные тестовые данные
test.empty-query=
test.short-query=#
test.ip-without-result=192.0.2.1
test.invalid-token=invalid-token

# Ожидаемые значения
expected.country-code=RU
expected.address-fragment=Москва
expected.invalid-token-status=403
expected.missing-token-status=401